{% load static %}
<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="PRYME TRAINING CENTER">
    <meta name="keywords" content="Gym, unica, creative, html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>PRYME | GYM</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'img/logo-favicon.png' %}" type="image/x-icon">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Muli:300,400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Oswald:300,400,500,600,700&display=swap" rel="stylesheet">

    <!-- Css Styles -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/flaticon.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/barfiller.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/magnific-popup.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/slicknav.min.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}" type="text/css">

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <!-- Botón volver arriba -->
    <style>
        .scroll-top-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background-color: #f30000;
            color: #ffffff;
            border-radius: 50%;
            text-align: center;
            line-height: 45px;
            font-size: 20px;
            z-index: 9999;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .scroll-top-btn.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

<body>

<!-- Preloader -->
<div id="preloder">
    <div class="loader"></div>
</div>

<!-- Offcanvas Menu -->
<div class="offcanvas-menu-overlay"></div>
<div class="offcanvas-menu-wrapper">
    <div class="canvas-close">
        <i class="fa fa-close"></i>
    </div>
    <nav class="canvas-menu mobile-menu">
        <ul>
            <li><a href="{% url 'main' %}">Inicio</a></li>
            <li><a href="{% url 'clases' %}">Clases</a></li>
            <li><a href="{% url 'tarifas' %}">Tarifas</a></li>
            <li><a href="{% url 'equipo' %}">Equipo</a></li>
            <li><a href="{% url 'contacto' %}">Contacto</a></li>
        </ul>
    </nav>
    <div id="mobile-menu-wrap"></div>
</div>

<!-- Header -->
<header class="header-section">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-3">
                <div class="logo">
                    <a href="{% url 'main' %}">
                        <img src="{% static 'img/logo.webp' %}" alt="Prime Gym Logo">
                    </a>
                </div>
            </div>
            <div class="col-lg-6">
                <nav class="nav-menu">
                    <ul>
                        <li><a href="{% url 'main' %}">Inicio</a></li>
                        <li><a href="{% url 'clases' %}">Clases</a></li>
                        <li><a href="{% url 'tarifas' %}">Tarifas</a></li>
                        <li><a href="{% url 'equipo' %}">Equipo</a></li>
                        <li><a href="{% url 'contacto' %}">Contacto</a></li>
                    </ul>
                </nav>
            </div>
        </div>
        <div class="canvas-open">
            <i class="fa fa-bars"></i>
        </div>
    </div>
</header>

<!-- =========================
     CONTENIDO DEL PERFIL
     ========================= -->
<section class="spad">
    <div class="container">
        {% block contenido %}
        {% endblock %}
    </div>
</section>

<!-- Footer -->
<section class="footer-section">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <div class="copyright-text">
                    Copyright &copy;
                    <script>document.write(new Date().getFullYear());</script>
                    All rights reserved
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Scroll Top -->
<a id="scrollTopButton" class="scroll-top-btn">
    <i class="fa fa-angle-up"></i>
</a>

<!-- JS -->
<script src="{% static 'js/jquery-3.3.1.min.js' %}"></script>
<script src="{% static 'js/bootstrap.min.js' %}"></script>
<script src="{% static 'js/jquery.magnific-popup.min.js' %}"></script>
<script src="{% static 'js/masonry.pkgd.min.js' %}"></script>
<script src="{% static 'js/jquery.barfiller.js' %}"></script>
<script src="{% static 'js/jquery.slicknav.js' %}"></script>
<script src="{% static 'js/owl.carousel.min.js' %}"></script>
<script src="{% static 'js/main.js' %}"></script>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
    AOS.init();

    const scrollTopBtn = document.getElementById('scrollTopButton');
    window.onscroll = function () {
        if (document.documentElement.scrollTop > 300) {
            scrollTopBtn.classList.add('show');
        } else {
            scrollTopBtn.classList.remove('show');
        }
    };
    scrollTopBtn.onclick = function (e) {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
</script>

</body>
</html>
