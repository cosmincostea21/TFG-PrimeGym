<div class="row mb-4">
    <div class="col-lg-12">
        <div class="class-item p-4">

            <h4 class="mb-3">
                <i class="fa fa-user"></i> Información personal
            </h4>

            <ul class="list-unstyled">
                <li>
                    <strong>Nombre:</strong> {{ cliente.nombre }}
                </li>
                <li>
                    <strong>Email:</strong> {{ cliente.email }}
                </li>

                {% if cliente.telefono %}
                <li>
                    <strong>Teléfono:</strong> {{ cliente.telefono }}
                </li>
                {% endif %}

                <li>
                    <strong>Tarifa actual:</strong> {{ cliente.tarifa.nombre }}
                </li>

                <li>
                    <strong>Fecha de alta:</strong> {{ cliente.fecha_registro|date:"d/m/Y" }}
                </li>
            </ul>

        </div>
    </div>
</div>
